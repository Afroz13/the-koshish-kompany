kind = "web"
previewPath = "/"
title = "The Koshish Kompany"
version = "1.0.0"
id = "artifacts/koshish-website"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 22073

[services.development]
run = "pnpm --filter @workspace/koshish-website run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/koshish-website", "run", "build" ]
publicDir = "artifacts/koshish-website/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "22073"
BASE_PATH = "/"
